# Example ESPHome config for the Jandy Aqualink keypad-presence component on an
# M5Stack Atom Lite + ATOM RS485 base. This is the publishable reference. The
# live device config on the ESPHome dashboard is generated from this at deploy
# time (with the real external_components repo URL and working secrets).

esphome:
  name: pool-bridge
  friendly_name: Pool RS485 Bridge

esp32:
  board: m5stack-atom
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    # Example only; set to your device's static IP (or remove for DHCP).
    static_ip: 192.168.4.51
    gateway: 192.168.4.1
    subnet: 255.255.255.0
  ap:
    ssid: "Pool Bridge Fallback"
    password: !secret ap_fallback_password

# Serves an AP and recovers if WiFi fails.
captive_portal:

# Boot-loop recovery: after repeated fast reboots, fall back to a minimal
# wifi+ota+api image so a bad firmware can always be re-flashed over the air.
safe_mode:

api:
  encryption:
    key: !secret pool_bridge_api_key

ota:
  - platform: esphome
    password: !secret pool_bridge_ota_password

logger:
  baud_rate: 0  # no serial logger; logs stream to the dashboard over the network

external_components:
  # Point this at the component repo. refresh: 0s forces a re-pull each compile.
  - source: github://OWNER/esphome-jandy-aqualink
    refresh: 0s

# The Jandy keypad-presence component. Owns the RS485 UART directly and replies
# to polls for `keypad_address` with the inert presence ACK (no key), which makes
# the panel stream display/status without actuating any equipment.
jandy_aqualink:
  tx_pin: 19
  rx_pin: 22
  baud_rate: 9600
  keypad_address: 0x08
  air_temperature:
    name: Pool Air Temperature
  pool_temperature:
    name: Pool Water Temperature
  spa_temperature:
    name: Spa Water Temperature

# Diagnostics (unchanged from the bridge build).
sensor:
  - platform: wifi_signal
    name: Pool Bridge WiFi RSSI
    update_interval: 60s
  - platform: uptime
    name: Pool Bridge Uptime
  - platform: internal_temperature
    name: Pool Bridge Internal Temp
    update_interval: 60s

binary_sensor:
  - platform: status
    name: Pool Bridge Status

web_server:
  port: 80
