# Example ESPHome config for the Jandy Aqualink keypad-presence component on an
# M5Stack Atom Lite + ATOM RS485 base. This is the publishable reference. The
# live device config on the ESPHome dashboard is generated from this at deploy
# time (with the real external_components repo URL and working secrets).

esphome:
  name: pool-bridge
  friendly_name: Pool RS485 Bridge

esp32:
  board: m5stack-atom
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    # Example only; set to your device's static IP (or remove for DHCP).
    static_ip: 192.168.4.51
    gateway: 192.168.4.1
    subnet: 255.255.255.0
  ap:
    ssid: "Pool Bridge Fallback"
    password: !secret ap_fallback_password

# Serves an AP and recovers if WiFi fails.
captive_portal:

# Boot-loop recovery: after repeated fast reboots, fall back to a minimal
# wifi+ota+api image so a bad firmware can always be re-flashed over the air.
safe_mode:

api:
  encryption:
    key: !secret pool_bridge_api_key

ota:
  - platform: esphome
    password: !secret pool_bridge_ota_password

logger:
  baud_rate: 0  # no serial logger; logs stream to the dashboard over the network
  task_log_buffer_size: 4096  # the core-1 task logs a multi-line bus census in bursts

external_components:
  # Point this at the component repo. refresh: 0s forces a re-pull each compile.
  - source: github://4pBdhJoZ3Xy3reVvBoU9C3YPzyXDDU/esphome-jandy-aqualink
    refresh: 0s

# The Jandy keypad-presence component. Owns the RS485 UART directly and replies
# to polls for `keypad_address` with the inert AllButton ACK (no key), which
# registers an emulated keypad on the panel without actuating any equipment.
# v1 publishes presence-health diagnostics; reading temperatures needs the
# keypad navigation layer (a later phase, see docs/).
jandy_aqualink:
  id: jandy_comp
  tx_pin: 19
  rx_pin: 22
  baud_rate: 9600
  keypad_address: 0x08   # a free AllButton keypad slot (0x08-0x0B); see README
  polls_answered:
    name: Pool Keypad Polls Answered
  reply_latency:
    name: Pool Keypad Reply Latency
  checksum_errors:
    name: Pool Bus Checksum Errors
  # Temperatures decoded from the iAqualink home page (needs the iAqualink
  # Presence switch on). Pool vs spa depends on the panel's current valve mode.
  air_temp:
    name: Pool Air Temp
  pool_temp:
    name: Pool Water Temp
  spa_temp:
    name: Spa Water Temp
  # Pump RPM/watts, read from the iAqualink STATUS page on demand (see the Read
  # Pump Speed button). The panel shows either temps or pump speed at a time, so
  # this updates when the Status page is viewed, not continuously.
  pump_rpm:
    name: Pool Pump Speed
  pump_watts:
    name: Pool Pump Watts
  # Equipment on/off decoded from the panel's keypad status bitmap (the inert
  # AllButton seat, address 0x08). Read-only; updates continuously as the panel
  # changes equipment. Bit positions pinned live 2026-06-01 (see docs/).
  spa_mode:
    name: Pool Spa Mode
  air_blower:
    name: Pool Air Blower (status)
  filter_pump_state:
    name: Pool Filter Pump (status)
  cleaner_state:
    name: Pool Cleaner (status)

# --- Phase 2 gated keypress controls ---
# Reading temperatures needs the panel to redraw its display, which it only does
# in response to a keypad button press. These controls send ONE display-only
# navigation key at a time, gated behind a master safety switch.
#
# Safety model:
#   - The switch defaults OFF and boots OFF (restore_mode ALWAYS_OFF). With it
#     off, the firmware is exactly v1: inert presence, no key ever sent.
#   - A button only arms a key when the switch is on; otherwise it is refused
#     and logged. Turning the switch off is the hard abort (clears any armed
#     key and reverts to inert).
#   - Only the five display-only nav keys are exposed. Equipment keys (pump,
#     spa, heaters, aux, override, hold) are not reachable, and the component
#     refuses any key outside its navigation allowlist.
switch:
  - platform: template
    name: "Pool Keypad Keypress Armed"
    id: keypad_interlock
    icon: "mdi:gesture-tap-button"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: "id(jandy_comp).set_interlock(true);"
    turn_off_action:
      - lambda: "id(jandy_comp).set_interlock(false);"

  # Read-only: when on, also emulate the iAqualink controller (0x33) so the panel
  # pushes its display pages (which carry the temperatures). Sends only inert
  # ACKs, never a key, so it cannot actuate equipment. Off by default.
  - platform: template
    name: "iAqualink Presence"
    id: iaq_presence
    icon: "mdi:thermometer-lines"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF   # was ALWAYS_OFF; temps keep reading after a reboot
    turn_on_action:
      - lambda: "id(jandy_comp).set_iaq_presence(true);"
    turn_off_action:
      - lambda: "id(jandy_comp).set_iaq_presence(false);"

  # Auto-refresh driver: when on, a 15-min interval reads the pump speed so HA
  # history captures the panel's stored schedule. View-only; off by default.
  - platform: template
    name: "Pool Pump Auto-Refresh"
    id: pump_autorefresh
    icon: "mdi:timer-refresh"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF   # resumes the watch after an overnight reboot

  # Promiscuous bus capture: when on, log every non-poll frame on the bus raw, so
  # we can record how a real iAqualink reads/writes the panel's schedule. Read-only
  # (logs only, transmits nothing). Off by default; it is verbose, so use it only
  # during a capture window then turn it off.
  - platform: template
    name: "Pool Bus Sniff"
    id: bus_sniff
    icon: "mdi:ear-hearing"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: "id(jandy_comp).set_sniff_all(true);"
    turn_off_action:
      - lambda: "id(jandy_comp).set_sniff_all(false);"

button:
  - platform: template
    name: "Pool Keypad Press MENU"
    icon: "mdi:menu"
    on_press:
      - lambda: "id(jandy_comp).arm_key(0x09);"   # KEY_MENU
  - platform: template
    name: "Pool Keypad Press RIGHT"
    icon: "mdi:arrow-right-bold"
    on_press:
      - lambda: "id(jandy_comp).arm_key(0x18);"   # KEY_RIGHT
  - platform: template
    name: "Pool Keypad Press LEFT"
    icon: "mdi:arrow-left-bold"
    on_press:
      - lambda: "id(jandy_comp).arm_key(0x13);"   # KEY_LEFT
  - platform: template
    name: "Pool Keypad Press ENTER"
    icon: "mdi:keyboard-return"
    on_press:
      - lambda: "id(jandy_comp).arm_key(0x1D);"   # KEY_ENTER
  - platform: template
    name: "Pool Keypad Press CANCEL"
    icon: "mdi:close-octagon"
    on_press:
      - lambda: "id(jandy_comp).arm_key(0x0E);"   # KEY_CANCEL

  # iAqualink control: switch the panel from spa mode to pool mode by pressing
  # the Spa toggle (0x12). Gated: needs the interlock on, iAqualink presence on,
  # and the panel currently in spa mode. Sends only 0x12, so it cannot reach Spa
  # Drain or Spa Fill. Reversible (press Spa again to go back).
  - platform: template
    name: "Switch to Pool Mode"
    icon: "mdi:pool"
    on_press:
      - lambda: "id(jandy_comp).request_pool_mode();"

  # iAqualink equipment toggles (gated by interlock + iAqualink presence + the
  # allowlist). The heater buttons are deliberately not exposed.
  - platform: template
    name: "Filter Pump"
    icon: "mdi:pump"
    on_press:
      - lambda: "id(jandy_comp).iaq_press(0x11);"   # home button 0 = Filter Pump
  - platform: template
    name: "Pool Light"
    icon: "mdi:lightbulb"
    on_press:
      - lambda: "id(jandy_comp).iaq_press(0x17);"   # home button 6 = Pool Light
  - platform: template
    name: "Cleaner"
    icon: "mdi:robot-vacuum"
    on_press:
      - lambda: "id(jandy_comp).iaq_press(0x15);"   # home button 4 = Cleaner
  - platform: template
    name: "Air Blower"
    icon: "mdi:weather-windy"
    on_press:
      - lambda: "id(jandy_comp).iaq_press(0x16);"   # home button 5 = Air Blower

  # DEVICES-page toggles (gated by interlock + iAqualink presence + the
  # device-toggle allowlist; each navigates to DEVICES and confirms the page
  # before pressing one keycode). Labels confirmed by the live test 2026-06-02:
  # slot 12 turned out to be the Solar Light. Spa Light's fixture is currently
  # unplugged (command confirmed correct on the bus, no light), and Sprinklers is
  # a legacy pool-cooling circuit whose controller was removed (command confirmed,
  # nothing wired). All three send correctly and are kept for future reconnection.
  - platform: template
    name: "Spa Light"
    icon: "mdi:lightbulb-night"
    on_press:
      - lambda: "id(jandy_comp).press_device_toggle(0x19);"   # DEVICES slot 8 = Spa Light (fixture unplugged 2026-06-02)
  - platform: template
    name: "Solar Light"
    icon: "mdi:outdoor-lamp"
    on_press:
      - lambda: "id(jandy_comp).press_device_toggle(0x1D);"   # DEVICES slot 12 = Solar Light (was "Extra Aux"; confirmed live 2026-06-02)
  - platform: template
    name: "Sprinklers"
    icon: "mdi:sprinkler"
    on_press:
      - lambda: "id(jandy_comp).press_device_toggle(0x1E);"   # DEVICES slot 13 = Sprinklers (legacy pool-cooling, controller removed)

  # Heaters (HIGHEST-STAKES; gated by interlock + presence + a HOME-page-only guard;
  # Spa Heat additionally refuses unless the panel is in spa mode). These are on/off
  # enables; once enabled the panel maintains the target. Temperature setpoints are a
  # follow-up build (Phase 2). The heater keycodes were excluded from every allowlist
  # until now.
  - platform: template
    name: "Pool Heat"
    icon: "mdi:radiator"
    on_press:
      - lambda: "id(jandy_comp).press_heater(0x13);"   # HOME slot 2 = Pool Heat
  - platform: template
    name: "Spa Heat"
    icon: "mdi:hot-tub"
    on_press:
      - lambda: "id(jandy_comp).press_heater(0x14);"   # HOME slot 3 = Spa Heat (spa mode only)

  # --- Survey navigation (read-only). Gated by the master interlock + iAqualink
  # presence. Each sends ONE global page-movement key; none can actuate equipment.
  # Temporary survey instruments; the useful ones stay, the rest get removed after.
  - platform: template
    name: "iAq Nav Home"
    icon: "mdi:home"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x01);"
  - platform: template
    name: "iAq Nav Other Devices"
    icon: "mdi:format-list-bulleted"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x18);"   # only honored from the HOME page
  - platform: template
    name: "iAq Nav Status"
    icon: "mdi:gauge"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x06);"
  - platform: template
    name: "iAq Nav Menu"
    icon: "mdi:menu"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x02);"
  - platform: template
    name: "iAq Nav Back"
    icon: "mdi:arrow-left"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x05);"
  - platform: template
    name: "iAq Nav Next Page"
    icon: "mdi:chevron-right"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x21);"
  - platform: template
    name: "iAq Nav Prev Page"
    icon: "mdi:chevron-left"
    on_press:
      - lambda: "id(jandy_comp).iaq_nav(0x20);"

  # Read the live pump speed: briefly view the STATUS page (RPM/watts), then auto-
  # return to HOME so temperatures keep updating. Gated by the interlock + presence.
  - platform: template
    name: "Read Pump Speed"
    icon: "mdi:pump"
    on_press:
      - lambda: "id(jandy_comp).read_pump_speed();"

  # --- Pump speed presets (gated by interlock + iAqualink presence). Each starts
  # the page-confirmed value-set sequence, then reads the new RPM back. The two
  # low values are tuned at the pad against the salt cell flow cutoff. ---
  - platform: template
    name: "Pump Speed: Night"
    icon: "mdi:weather-night"
    on_press:
      - lambda: "id(jandy_comp).set_pump_rpm(1100);"   # quiet overnight circulation, below salt floor by design (live-confirmed 2026-05-31)
  - platform: template
    name: "Pump Speed: Low"
    icon: "mdi:speedometer-slow"
    on_press:
      - lambda: "id(jandy_comp).set_pump_rpm(2000);"   # salt flow floor ~1850 (live-tuned 2026-05-31) + 150 cushion
  - platform: template
    name: "Pump Speed: Normal"
    icon: "mdi:speedometer-medium"
    on_press:
      - lambda: "id(jandy_comp).set_pump_rpm(2750);"
  - platform: template
    name: "Pump Speed: High"
    icon: "mdi:speedometer"
    on_press:
      - lambda: "id(jandy_comp).set_pump_rpm(3200);"

# Pump speed slider. Inert unless the interlock is armed (set_pump_rpm refuses
# otherwise), same as the buttons. Snaps to 5 RPM; the component re-clamps to
# 600-3450 regardless.
number:
  - platform: template
    name: "Pump Speed Set"
    id: pump_speed_set
    icon: "mdi:speedometer"
    unit_of_measurement: "RPM"
    min_value: 600
    max_value: 3450
    step: 5
    mode: slider
    optimistic: true
    set_action:
      - lambda: "id(jandy_comp).set_pump_rpm((uint16_t) x);"

# When Auto-Refresh is on AND iAqualink presence is on, read the pump speed every
# 15 minutes. read_pump_speed() is view-only (STATUS then auto-HOME); it actuates
# nothing. The presence check here only avoids a REFUSED log when presence is off.
interval:
  - interval: 15min
    then:
      - lambda: |-
          if (id(pump_autorefresh).state && id(iaq_presence).state) {
            id(jandy_comp).read_pump_speed();
          }

# Diagnostics (unchanged from the bridge build).
sensor:
  - platform: wifi_signal
    name: Pool Bridge WiFi RSSI
    update_interval: 60s
  - platform: uptime
    name: Pool Bridge Uptime
  - platform: internal_temperature
    name: Pool Bridge Internal Temp
    update_interval: 60s

binary_sensor:
  - platform: status
    name: Pool Bridge Status

web_server:
  port: 80
